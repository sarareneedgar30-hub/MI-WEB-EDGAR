<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sopa de Letras Cyber</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    max-width:1000px;
    width:100%;
    background:#111827;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,255,255,.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#00ffff;
    text-shadow:0 0 15px #00ffff;
}

.game{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    justify-content:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(15,40px);
    gap:4px;
}

.cell{
    width:40px;
    height:40px;
    background:#1f2937;
    border:1px solid #374151;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    user-select:none;
    font-weight:bold;
    transition:.2s;
}

.cell:hover{
    background:#334155;
}

.selected{
    background:#2563eb !important;
}

.found{
    background:#00c853 !important;
    color:white;
    box-shadow:0 0 10px #00ff88;
}

.words{
    min-width:250px;
}

.words h2{
    margin-bottom:15px;
    color:#00ffff;
}

.words li{
    list-style:none;
    padding:8px;
    margin:5px 0;
    background:#1f2937;
    border-radius:8px;
}

.completed{
    text-decoration:line-through;
    color:#00ff88;
}

#message{
    margin-top:20px;
    text-align:center;
    font-size:1.3rem;
    color:#00ff88;
}
</style>
</head>
<body>

<div class="container">

<h1>🧩 SOPA DE LETRAS CYBER</h1>

<div class="game">

<div id="grid" class="grid"></div>

<div class="words">
<h2>Palabras</h2>
<ul id="wordList">
<li data-word="JAVASCRIPT">JAVASCRIPT</li>
<li data-word="PYTHON">PYTHON</li>
<li data-word="HTML">HTML</li>
<li data-word="CSS">CSS</li>
<li data-word="REACT">REACT</li>
<li data-word="NODE">NODE</li>
<li data-word="MYSQL">MYSQL</li>
<li data-word="JAVA">JAVA</li>
</ul>
</div>

</div>

<div id="message"></div>

</div>

<script>

const board = [
"JAVASCRIPTRQWE",
"QWERTYUIOPASDF",
"PYTHONZXCVBNMQ",
"LKJHGFDSAMYSQL",
"QAZWSXEDCRFVTG",
"HTMLPOIUYTREWA",
"ZXCVBNMLKJHGFD",
"QWERTREACTYUIO",
"PASDFGHJKLZXCV",
"BNMQWERTYNODEA",
"SDFGHJKLPOIUYT",
"QAZWSXEDCRFVTG",
"JAVAKLMNOPQRST",
"ZXCVBNMASDFGHJ",
"QWERTYCSSUIOPA"
];

const words = [
"JAVASCRIPT",
"PYTHON",
"HTML",
"CSS",
"REACT",
"NODE",
"MYSQL",
"JAVA"
];

const grid = document.getElementById("grid");

let selected = [];
let foundWords = [];

for(let r=0;r<15;r++){
    for(let c=0;c<15;c++){

        const div = document.createElement("div");
        div.classList.add("cell");
        div.textContent = board[r][c];

        div.dataset.letter = board[r][c];

        div.addEventListener("click",()=>{

            if(div.classList.contains("found")) return;

            div.classList.toggle("selected");

            if(div.classList.contains("selected")){
                selected.push(div);
            }else{
                selected = selected.filter(x=>x!==div);
            }

            verify();

        });

        grid.appendChild(div);
    }
}

function verify(){

    let word = selected.map(x=>x.textContent).join("");

    let reverse = word.split("").reverse().join("");

    words.forEach(w=>{

        if(
            (word===w || reverse===w)
            &&
            !foundWords.includes(w)
        ){

            foundWords.push(w);

            selected.forEach(c=>{
                c.classList.remove("selected");
                c.classList.add("found");
            });

            document
            .querySelector(`[data-word="${w}"]`)
            .classList.add("completed");

            selected=[];

            if(foundWords.length===words.length){
                document.getElementById("message")
                .innerHTML="🏆 ¡FELICIDADES! COMPLETASTE LA SOPA DE LETRAS";
            }

        }

    });

}
</script>

</body>
</html>
