<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Retro Snake</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Courier New, monospace;
}

body{
    background:#050505;
    color:#00ff88;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:15px;
    text-shadow:0 0 15px #00ff88;
}

.score{
    margin-bottom:15px;
    font-size:20px;
}

canvas{
    border:4px solid #00ff88;
    box-shadow:0 0 30px #00ff88;
    background:#111;
}

.info{
    margin-top:15px;
    color:#ccc;
}

.gameover{
    margin-top:15px;
    font-size:24px;
    color:#ff4444;
    display:none;
}
</style>
</head>
<body>

<div class="container">

<h1>🐍 RETRO SNAKE</h1>

<div class="score">
Puntos: <span id="score">0</span>
</div>

<canvas id="game" width="500" height="500"></canvas>

<div class="gameover" id="gameover">
💀 GAME OVER<br>
Presiona ESPACIO para reiniciar
</div>

<div class="info">
Usa las flechas ↑ ↓ ← → para moverte
</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 25;
const canvasSize = 500;

let snake;
let food;
let score;
let speed;
let game;
let direction;

function startGame(){

    snake = [
        {x:10*box,y:10*box}
    ];

    food = {
        x:Math.floor(Math.random()*20)*box,
        y:Math.floor(Math.random()*20)*box
    };

    score = 0;
    speed = 200;
    direction = "RIGHT";

    document.getElementById("score").textContent = score;
    document.getElementById("gameover").style.display="none";

    clearInterval(game);
    game = setInterval(draw,speed);
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowLeft" && direction!="RIGHT")
        direction="LEFT";

    if(e.key==="ArrowUp" && direction!="DOWN")
        direction="UP";

    if(e.key==="ArrowRight" && direction!="LEFT")
        direction="RIGHT";

    if(e.key==="ArrowDown" && direction!="UP")
        direction="DOWN";

    if(e.code==="Space")
        startGame();
});

function drawGrid(){

    for(let i=0;i<20;i++){

        for(let j=0;j<20;j++){

            ctx.strokeStyle="#222";

            ctx.strokeRect(
                i*box,
                j*box,
                box,
                box
            );
        }
    }
}

function draw(){

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawGrid();

    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(
        food.x+box/2,
        food.y+box/2,
        box/2.5,
        0,
        Math.PI*2
    );
    ctx.fill();

    for(let i=0;i<snake.length;i++){

        ctx.fillStyle =
        i===0 ? "#00ff88" : "#00aa55";

        ctx.fillRect(
            snake[i].x,
            snake[i].y,
            box,
            box
        );
    }

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction==="LEFT") headX-=box;
    if(direction==="RIGHT") headX+=box;
    if(direction==="UP") headY-=box;
    if(direction==="DOWN") headY+=box;

    if(
        headX<0 ||
        headY<0 ||
        headX>=canvasSize ||
        headY>=canvasSize ||
        collision(headX,headY,snake)
    ){
        clearInterval(game);

        document.getElementById("gameover")
        .style.display="block";

        return;
    }

    if(headX===food.x && headY===food.y){

        score++;

        document.getElementById("score")
        .textContent = score;

        food = {
            x:Math.floor(Math.random()*20)*box,
            y:Math.floor(Math.random()*20)*box
        };

        if(speed>50){

            speed -= 5;

            clearInterval(game);
            game = setInterval(draw,speed);
        }

    }else{
        snake.pop();
    }

    const newHead = {
        x:headX,
        y:headY
    };

    snake.unshift(newHead);
}

function collision(x,y,array){

    for(let i=0;i<array.length;i++){

        if(
            x===array[i].x &&
            y===array[i].y
        ){
            return true;
        }
    }

    return false;
}

startGame();

</script>

</body>
</html>
